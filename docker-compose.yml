services:
  video-error-checker:
    build: .
    container_name: video-error-checker
    restart: unless-stopped
    environment:
      - WEB_PORT=8080
      - TZ=Europe/London
      - PUID=1000
      - PGID=1000
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config
      - ${MEDIA_PATH:-/media}:/media:ro
